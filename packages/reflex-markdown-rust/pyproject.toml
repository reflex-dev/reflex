[build-system]
requires = ["maturin>=1.7,<2"]
build-backend = "maturin"

[project]
name = "reflex-markdown-rust"
version = "0.0.0"
description = "pulldown-cmark Markdown parser as a Reflex acceleration wheel (PyO3 + maturin)."
requires-python = ">=3.10"
license = { text = "Apache-2.0" }
classifiers = [
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Rust",
]

[tool.maturin]
manifest-path = "crates/reflex_markdown_py/Cargo.toml"
module-name = "reflex_markdown_rust._native"
python-source = "python"
features = ["pyo3/extension-module"]
