[project]
name = "reflex-docgen"
dynamic = ["version"]
description = "Generate documentation for Reflex components."
readme = "README.md"
authors = [{ name = "Khaleel Al-Adhami", email = "khaleel@reflex.dev" }]
maintainers = [{ name = "Khaleel Al-Adhami", email = "khaleel@reflex.dev" }]
requires-python = ">=3.10"
dependencies = [
    "griffelib>=2.0.1",
    "mistletoe>=1.4.0",
    "pyyaml>=6.0",
    "reflex",
    "typing-extensions",
    "typing-inspection>=0.4.2",
]

[tool.uv.sources]
reflex = { workspace = true }

[tool.hatch.version]
source = "vcs"
raw-options = { root = "../..", tag_regex = "^reflex-docgen-v(?P<version>.+)$" }

[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"
