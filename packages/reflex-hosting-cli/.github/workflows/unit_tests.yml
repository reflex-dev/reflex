name: unit-tests

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/unit_tests.yml"
      - ".github/actions/**"
      - "reflex_cli/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".coveragerc"
  pull_request:
    branches: ["main"]
    paths:
      - ".github/workflows/unit_tests.yml"
      - ".github/actions/**"
      - "reflex_cli/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".coveragerc"

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  unit-tests:
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        # Run windows only on 3.11
        exclude:
          - os: windows-latest
            python-version: "3.13"
          - os: windows-latest
            python-version: "3.12"
          - os: windows-latest
            python-version: "3.10"
    runs-on: ${{ matrix.os }}
    # Service containers to run with `runner-job`
    services:
      # Label used to access the service container
      redis:
        image: ${{ matrix.os == 'ubuntu-latest' && 'redis' || '' }}
        # Set health checks to wait until redis has started
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          # Maps port 6379 on service container to the host
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run unit tests
        run: uv run pytest tests --cov --no-cov-on-fail --cov-report=
        env:
          PYTHONUNBUFFERED: 1
      - run: uv run coverage html
